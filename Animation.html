<!DOCTYPE html>
<html>
    <head>
        <style>
            @keyframes example {
              0% {background-color: red;} 
              25% {background-color: rgb(254, 254, 2);}
              50% {background-color: aqua;}
              100% {background-color: rgb(0, 255, 128);}   
            }
    div{
        width: 100px;
        height: 100px; ;
        background-color: aqua;
        animation-name: example ;
        animation-duration: 5s;

    }        
        </style>
    </head>
    <body>
        <div>Techy</div>
    </body>
</html>
